{% extends 'booking/base.html' %}
{% block title %}Login — MediCare Clinic{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-header text-white py-3" style="background:linear-gradient(135deg,#0d47a1,#1a73e8);">
                <h4 class="mb-0 text-center"><i class="fas fa-sign-in-alt me-2"></i>Patient Login</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {% if form.errors %}
                        <div class="alert alert-danger">Invalid username or password. Please try again.</div>
                    {% endif %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold"><i class="fas fa-user me-1"></i>Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold"><i class="fas fa-lock me-1"></i>Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                    </div>
                    <input type="hidden" name="next" value="{{ next }}">
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-sign-in-alt me-2"></i>Login
                        </button>
                    </div>
                </form>
                <hr>
                <p class="text-center mb-0">New patient? <a href="{% url 'register' %}">Register here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
